name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  build:
    name: build portable .pyz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build dist/purchasing-coach.pyz
        run: python scripts/build_portable.py

      - name: Smoke-test the built app
        run: |
          printf '/quit\n' | python dist/purchasing-coach.pyz \
            --guideline samples/XXEON_IT_Procurement_Guideline.docx \
            --backend keyword

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: purchasing-coach-pyz
          path: dist/purchasing-coach.pyz
          if-no-files-found: error
